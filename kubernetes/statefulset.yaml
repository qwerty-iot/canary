apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: canary
  namespace: monitoring
  labels:
    app.kubernetes.io/name: canary
    app.kubernetes.io/component: monitoring
spec:
  serviceName: canary
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: canary
      app.kubernetes.io/component: monitoring
  template:
    metadata:
      labels:
        app.kubernetes.io/name: canary
        app.kubernetes.io/component: monitoring
    spec:
      containers:
        - name: canary
          image: ghcr.io/qwerty-iot/canary:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: CANARY_CONFIG
              value: /config/config.yaml
          volumeMounts:
            - name: canary-config
              mountPath: /config
              readOnly: true
      volumes:
        - name: canary-config
          configMap:
            name: canary-config
            items:
              - key: config.yaml
                path: config.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: canary
  namespace: monitoring
  labels:
    app.kubernetes.io/name: canary
    app.kubernetes.io/component: monitoring
spec:
  selector:
    app.kubernetes.io/name: canary
    app.kubernetes.io/component: monitoring
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
